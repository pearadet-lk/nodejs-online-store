apiVersion: v1
kind: Namespace
metadata:
  name: online-store
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: online-store
data:
  AUTH_JWT_ISSUER: online-store
  AUTH_JWT_AUDIENCE: online-store-clients
  AUTH_JWT_SIGNING_KEY: dev-super-secret-signing-key-min-32-chars
  AUTH_ACCESS_TOKEN_MINUTES: "15"
  AUTH_REFRESH_TOKEN_DAYS: "7"
  PORT: "8080"
  USER_SERVICE_URL: http://user-service:8080
  PRODUCT_SERVICE_URL: http://product-service:8080
  CART_SERVICE_URL: http://cart-service:8080
  ORDER_SERVICE_URL: http://order-service:8080
  PAYMENT_SERVICE_URL: http://payment-service:8080
  INVENTORY_SERVICE_URL: http://inventory-service:8080
  SHIPPING_SERVICE_URL: http://shipping-service:8080
  HISTORY_SERVICE_URL: http://history-service:8080
  EMAIL_SERVICE_URL: http://email-service:8080
  CORS_ORIGIN: http://localhost:4200,http://127.0.0.1:4200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: online-store-node/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: online-store
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
